        .navbar {

        .navbar-container {

            display: flex;
            justify-content: space-between;

        }

        .nav-logo {
            font-size: 1.25rem;

            color: #1d4ed8; 
            text-decoration: none;
        }

        .nav-menu {

            gap: 15px; 
        }

        .nav-item {
            color: #64748b;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;

            align-items: center;
        }

        .nav-item.active {

            background-color: #eff6ff;

        }

        }

            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            margin-bottom: 40px;

        .back-btn {
            display: inline-block;

        /* 🖼️ 사진 그리드 레이아웃 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .photo-card {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 20px -3px rgba(29, 78, 216, 0.08);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* 🔍 트렌디하게 바뀐 모달 팝업 스타일 */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 15, 0.92); 
            backdrop-filter: blur(8px); /* 배경을 은은하게 블러처리 (고급스러운 느낌) */
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 90%;
            max-height: 90vh;
        }

        .modal img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            object-fit: contain;
        }

        /* ❌ 세련된 닫기 버튼 */
        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            z-index: 1010;
            transition: color 0.2s, transform 0.2s;
            background: rgba(255, 255, 255, 0.08);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* ◀ ▶ 세련된 미니멀 화살표 버튼 */
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 22px;
            width: 52px;
            height: 52px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            z-index: 1010;
        }

        .modal-nav:hover {
            background-color: rgba(255, 255, 255, 0.25);
            color: #fff;
            transform: translateY(-50%) scale(1.08);
        }

        .modal-prev {
            left: 20px;
        }

        .modal-next {
            right: 20px;
        }

        /* 사진 번호 카운터 (모던한 알약 캡슐 스타일) */
        .modal-counter {
            position: absolute;
            bottom: -40px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>

    <!-- 🔍 모던하게 바뀐 팝업 창 -->
    <div id="imageModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <button class="modal-nav modal-prev" onclick="changeSlide(-1)">&#10094;</button>
        <div class="modal-content-wrapper" onclick="event.stopPropagation()">
            <img id="modalImage" src="" alt="원본 사진">
            <div id="modalCounter" class="modal-counter">1 / 33</div>
        </div>
        <button class="modal-nav modal-next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <script>
        const images = [];
        document.querySelectorAll('.photo-grid img').forEach(img => {
            images.push(img.src);
        });

        let currentIndex = 0;

        function openModal(index) {
            currentIndex = index;
            const modal = document.getElementById('imageModal');
            modal.style.display = 'flex';
            updateModalContent();
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function changeSlide(direction) {
            currentIndex += direction;
            if (currentIndex < 0) {
                currentIndex = images.length - 1;
            } else if (currentIndex >= images.length) {
                currentIndex = 0;
            }
            updateModalContent();
        }

        function updateModalContent() {
            const modalImg = document.getElementById('modalImage');
            const modalCounter = document.getElementById('modalCounter');
            modalImg.src = images[currentIndex];
            modalCounter.innerText = `${currentIndex + 1} / ${images.length}`;
        }

        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('imageModal');
            if (modal.style.display === 'flex') {
                if (event.key === 'ArrowLeft') {
                    changeSlide(-1);
                } else if (event.key === 'ArrowRight') {
                    changeSlide(1);
                } else if (event.key === 'Escape') {
                    closeModal();
                }
            }
        });

        document.getElementById('imageModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeModal();
            }
        });
    </script>
